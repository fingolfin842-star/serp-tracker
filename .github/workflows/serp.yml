name: SERP Tracker

on:
  schedule:
   - cron: '0 5 * * *'  # щодня о 08:00 за Києвом (05:00 UTC)
  workflow_dispatch:  # можна запустити вручну

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run SERP Tracker
        env:
          AHREFS_API_KEY: ${{ secrets.AHREFS_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python serp_tracker.py

      - name: Commit updated history
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add serp_history.json
          git diff --staged --quiet || git commit -m "Update serp_history.json [skip ci]"
          git push
